<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoSpider</title>
    <style>
        /* Базовые стили для страницы */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Стили для шапки (вверху сайта) */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        /* Стили для навигационных ссылок */
        nav {
            margin-top: 15px;
        }

        nav a {
            color: #fff;
            text-box-trim: auto;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #1abc9c; /* Цвет ссылки при наведении */
        }

        /* Контентная область */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* Подвал */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>LoSpider</h1>
        <nav>
            <a href="index.html">Главная</a>
            <a href="privacy.html">Privacy Policy</a>
        </nav>
    </header>

    <main>
        <h2>Добро пожаловать на сайт LoSpider!</h2>
        <p>Это главная страница вашего нового проекта. Вы можете изменить этот текст на любой другой, который вам нужен.</p>
    </main>

    <footer>
        <p>&copy; 2026 LoSpider. Все права защищены.</p>
    </footer>

</body>
</html>
