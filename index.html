<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoSpider</title>
    <style>
        /* Сброс всех системных отступов, чтобы ничего не съезжало */
        *, *::before, *::after {
            box-sizing: border-box !important;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Шапка: строго фиксированная высота за счет паддингов и border-box */
        header.custom-header {
            background-color: #2c3e50 !important;
            padding: 20px !important;
            display: block !important;
            width: 100% !important;
        }

        /* Контейнер внутри шапки */
        .header-container {
            max-width: 800px !important;
            margin: 0 auto !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            flex-wrap: wrap !important;
        }

        /* Название проекта */
        .header-container h1 {
            margin: 0 !important;
            padding: 0 !important;
            font-size: 2rem !important;
            color: #ffffff !important;
            text-transform: none !important;
            font-weight: bold !important;
            line-height: 1 !important;
        }

        /* Навигация */
        nav.custom-nav {
            display: block !important;
        }

        nav.custom-nav a {
            color: #ffffff !important;
            text-decoration: none !important;
            margin-left: 20px !important;
            font-size: 1rem !important;
            transition: color 0.3s !important;
            display: inline-block !important;
            line-height: 1 !important;
        }

        nav.custom-nav a:hover {
            color: #1abc9c !important;
        }

        /* Область контента (белое поле) */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            line-height: 1.6;
        }

        /* Адаптивность для мобильных */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column !important;
                text-align: center !important;
            }
            .header-container h1 {
                margin-bottom: 15px !important;
            }
            nav.custom-nav a {
                margin: 0 10px !important;
            }
            main {
                margin: 20px 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="custom-header">
        <div class="header-container">
            <h1>LoSpider</h1>
            <nav class="custom-nav">
                <a href="index.html">Home</a>
                <a href="privacy.html">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Welcome to LoSpider!</h2>
        <p></p>
    </main>

</body>
</html>
