<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoSpider</title>
    <style>
        /* Базовые стили */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Темная плашка шапки на всю ширину */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 15px 20px;
        }

        /* Контейнер внутри шапки для ограничения ширины и выравнивания */
        .header-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between; /* Название слева, ссылки справа */
            align-items: center; /* Центрирование по вертикали */
            flex-wrap: wrap; /* Чтобы элементы переносились на мобильных */
        }

        .header-container h1 {
            margin: 0;
            font-size: 2rem;
        }

        /* Навигация */
        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Основной контент сайта */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Адаптивность для мобильных устройств (экраны меньше 600px) */
        @media (max-width: 600px) {
            .header-container {
                flex-direction: column; /* Элементы встают друг под друга */
                text-align: center;
            }

            .header-container h1 {
                margin-bottom: 10px; /* Отступ между названием и ссылками */
            }

            nav {
                margin: 0;
                padding: 0;
            }

            nav a {
                margin: 0 10px; /* Одинаковые отступы для ссылок на мобильном */
            }

            main {
                margin: 20px 10px; /* Меньше отступы по краям экрана */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>LoSpider</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="privacy.html">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Welcome to LoSpider!</h2>
        <p></p>
    </main>

</body>
</html>
