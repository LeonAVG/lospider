<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - LoSpider</title>
    <style>
        /* Стили полностью совпадают с главной страницей для единообразия */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 15px 20px;
        }

        .header-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-container h1 {
            margin: 0;
            font-size: 2rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Контентная область для большого текста */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px; /* Чуть больше внутренних отступов для удобства чтения */
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            box-sizing: border-box;
            line-height: 1.6; /* Увеличенное межстрочное расстояние для больших текстов */
        }

        /* Дополнительные стили для оформления текста политики безопасности */
        main h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        
        main h3 {
            margin-top: 25px;
            color: #34495e;
        }

        main p {
            margin-bottom: 15px;
            text-align: justify; /* Выравнивание по ширине для красоты */
        }

        @media (max-width: 600px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }

            .header-container h1 {
                margin-bottom: 10px;
            }

            nav a {
                margin: 0 10px;
            }

            main {
                margin: 20px 10px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>LoSpider</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="privacy.html">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>Privacy Policy</h2>
        
        <!-- ======================================================= -->
        <!-- ВСТАВЛЯЙТЕ ВАШ HTML КОД ТЕКСТА СЮДА (НАЧАЛО) -->
        
        <p>Your text starts here. Replace this paragraph with your custom HTML text code.</p>
        
        <!-- ВСТАВЛЯЙТЕ ВАШ HTML КОД ТЕКСТА СЮДА (КОНЕЦ) -->
        <!-- ======================================================= -->

    </main>

</body>
</html>
