<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoSpider</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* Шапка сайта */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            text-align: center;
            position: relative; /* Нужно для позиционирования ссылок */
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        /* Ссылки перенесены в верхний правый угол */
        nav {
            position: absolute;
            top: 25px;
            right: 20px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #1abc9c;
        }

        /* Контентная область */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 600px) {
            header {
                padding-top: 60px; /* Добавляем место сверху, чтобы ссылки не перекрывали заголовок */
            }
            nav {
                position: static;
                text-align: center;
                margin-top: 10px;
            }
            nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>LoSpider</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="privacy.html">Privacy Policy</a>
        </nav>
    </header>

    <main>
        <h2>Welcome to LoSpider!</h2>
        <p>This is the main page of your project. You can modify this text with your own content.</p>
    </main>

</body>
</html>
